<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WE Stores AI Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --we-navy:    #160A30;
  --we-purple:  #6B21A8;
  --we-purple2: #7C3AED;
  --we-orange:  #F5A31A;
  --we-teal:    #00A896;
  --we-green:   #16A34A;
  --we-bg:      #F5F0FB;
  --we-surface: #FFFFFF;
  --we-s2:      #F0E9FA;
  --we-border:  #DDD0EF;
  --we-text:    #160A30;
  --we-mid:     #5B4080;
  --we-dim:     #9B82B8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--we-bg); color: var(--we-text); min-height: 100vh; }
.we-accent-bar { height: 4px; background: linear-gradient(90deg, var(--we-purple) 0%, var(--we-orange) 50%, var(--we-teal) 100%); }
.we-nav {
  background: var(--we-navy);
  height: 58px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 20px rgba(22,10,48,.4);
}
.nav-brand { display: flex; align-items: center; gap: 12px; }
.we-logo { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--we-orange); font-weight: 900; font-size: 18px; color: white; }
.nav-title { font-family: 'Cairo', sans-serif; color: white; }
.nav-title .t1 { font-size: 15px; font-weight: 700; letter-spacing: .3px; line-height: 1; }
.nav-title .t2 { font-size: 9px; color: rgba(255,255,255,.45); letter-spacing: 2.5px; margin-top: 2px; }
.page { max-width: 700px; margin: 0 auto; padding: 32px 16px 80px; }
.data-card {
  background: white; border-radius: 14px;
  padding: 20px; margin-bottom: 16px;
  border: 1px solid var(--we-border);
  box-shadow: 0 2px 12px rgba(107,33,168,.06);
}
.data-card h3 {
  font-size: 13px; font-weight: 800; color: var(--we-navy);
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 2px solid var(--we-s2);
}
.chat-container { display: flex; flex-direction: column; height: 380px; }
.chat-messages {
  flex: 1; overflow-y: auto; margin-bottom: 12px; padding: 12px;
  background: var(--we-s2); border-radius: 8px;
  display: flex; flex-direction: column; gap: 10px;
}
.message {
  padding: 10px 14px; border-radius: 8px; max-width: 85%;
  word-wrap: break-word; line-height: 1.5; font-size: 13px;
}
.message.user {
  align-self: flex-end; background: var(--we-purple);
  color: white; border-radius: 14px 14px 2px 14px;
}
.message.ai {
  align-self: flex-start; background: white;
  color: var(--we-text); border: 1px solid var(--we-border);
  border-radius: 14px 14px 14px 2px;
}
.chat-input-area { display: flex; gap: 8px; }
.chat-input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--we-border);
  border-radius: 8px; font-size: 13px; font-family: inherit;
}
.chat-input:focus { outline: none; border-color: var(--we-purple); box-shadow: 0 0 0 3px rgba(107,33,168,.1); }
.chat-input:disabled { background: var(--we-s2); cursor: not-allowed; }
.send-button {
  padding: 10px 18px; background: var(--we-purple);
  color: white; border: none; border-radius: 8px;
  cursor: pointer; font-weight: 600; font-size: 12px;
  transition: all .3s;
}
.send-button:hover:not(:disabled) { background: var(--we-purple2); transform: translateY(-2px); }
.send-button:disabled { opacity: 0.5; cursor: not-allowed; }
.stats-box { background: white; border-radius: 14px; padding: 18px; border: 1px solid var(--we-border); text-align: center; }
.stats-label { font-size: 11px; color: var(--we-dim); letter-spacing: 1px; margin-bottom: 6px; }
.stats-value { font-size: 28px; font-weight: 900; color: var(--we-purple); }
.loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #f3f3f3; border-top: 2px solid var(--we-purple); border-radius: 50%; animation: spin 1s linear infinite; margin-right: 6px; vertical-align: middle; }
.hidden { display: none !important; }
.upload-section {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 20px;
}
.upload-section h2 { font-size: 20px; font-weight: 800; color: var(--we-navy); margin-bottom: 10px; }
.upload-section p { font-size: 13px; color: var(--we-mid); margin-bottom: 20px; }
.file-input-wrapper {
  position: relative;
  display: inline-block;
}
.file-input-wrapper input[type="file"] {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}
.file-upload-btn {
  padding: 12px 24px; background: var(--we-purple);
  color: white; border: 2px solid var(--we-purple);
  border-radius: 8px; cursor: pointer; font-weight: 600;
  font-size: 14px; display: flex; align-items: center; gap: 8px;
  transition: all .3s;
}
.file-upload-btn:hover {
  background: var(--we-purple2); border-color: var(--we-purple2);
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@media (max-width: 768px) { .page { padding: 24px 12px 60px; } .message { max-width: 100%; } }
</style>
</head>
<body>

<div class="we-accent-bar"></div>

<nav class="we-nav">
  <div class="nav-brand">
    <div class="we-logo">WE</div>
    <div class="nav-title">
      <div class="t1">WE Stores AI</div>
      <div class="t2">ANALYZER</div>
    </div>
  </div>
</nav>

<div class="page">
  <div id="uploadSection" class="upload-section hidden">
    <h2>📁 Upload Your Stores Data</h2>
    <p>Upload CSV or Excel file to analyze with AI</p>
    <div class="file-input-wrapper">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" onchange="handleFileUpload(event)" />
      <button class="file-upload-btn">
        📤 Choose File
      </button>
    </div>
    <p style="font-size: 11px; color: var(--we-dim); margin-top: 20px;">
      CSV, XLSX, XLS files supported
    </p>
  </div>

  <div id="mainApp">
    <div class="data-card">
      <h3>📊 Quick Stats</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="stats-box">
          <div class="stats-label">TOTAL RECORDS</div>
          <div class="stats-value" id="totalRecords">0</div>
        </div>
        <div class="stats-box">
          <div class="stats-label">DATA FIELDS</div>
          <div class="stats-value" id="totalFields">0</div>
        </div>
      </div>
    </div>

    <div class="data-card">
      <h3>💬 AI Assistant</h3>
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="message ai"><span class="loading"></span>Loading your data...</div>
        </div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="Ask about your data..." />
          <button class="send-button" id="sendButton" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>
<script>
// CONFIG
const CONFIG = {
  CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYRknruCGqhCHg2LGcnZf8Z4JhJG6jmU1sp03ETEZctvmIUVWUvv2gUTbQr_fhG63041pQyg5gjrcW/pub?output=csv',
  CLAUDE_MODEL: 'claude-sonnet-4-20250514',
  CLAUDE_MAX_TOKENS: 1000,
  SAMPLE_DATA_ROWS: 30
};

let appState = { sheetData: [], headers: [], conversationHistory: [], isConnected: false };

// Load on page load
window.onload = () => {
  loadSheetData();
};

// Load from Google Sheets CSV
async function loadSheetData() {
  try {
    document.getElementById('chatMessages').innerHTML = '<div class="message ai"><span class="loading"></span>Loading your data...</div>';
    
    // Use the CSV export URL
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYRknruCGqhCHg2LGcnZf8Z4JhJG6jmU1sp03ETEZctvmIUVWUvv2gUTbQr_fhG63041pQyg5gjrcW/pub?output=csv';
    
    const response = await fetch(csvUrl, {
      method: 'GET',
      headers: {
        'Content-Type': 'text/csv'
      },
      mode: 'no-cors'
    });
    
    // With no-cors, we can't read response body, so try alternative approach
    // Use a CORS proxy that's public
    const proxyUrl = 'https://thingproxy.freeboard.io/fetch/';
    const proxiedUrl = proxyUrl + csvUrl;
    
    const res = await fetch(proxiedUrl);
    if (!res.ok) throw new Error('Cannot fetch CSV');
    
    const csv = await res.text();
    if (!csv || csv.length < 10) throw new Error('CSV is empty');
    
    // Parse CSV
    const lines = csv.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) throw new Error('No data in CSV');
    
    const headers = lines[0].split(',').map(h => h.trim());
    const data = lines.slice(1).map(line => {
      const values = line.split(',').map(v => v.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = values[i] || '');
      return obj;
    }).filter(row => Object.values(row).some(v => v));
    
    appState.headers = headers;
    appState.sheetData = data;
    appState.isConnected = true;
    
    updateStats();
    enableChat();
    
    document.getElementById('chatMessages').innerHTML = '<div class="message ai">👋 Ask me anything about your data!</div>';
    addMessage('ai', `✅ Loaded ${appState.sheetData.length} records. What would you like to know?`);
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('chatMessages').innerHTML = `<div class="message ai">❌ ${error.message}<br><br>Try uploading a CSV file instead.</div>`;
    showUploadUI();
  }
}

// Show upload UI
function showUploadUI() {
  document.getElementById('uploadSection').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
}

// Show main app
function showMainApp() {
  document.getElementById('uploadSection').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
}

// Handle file upload
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  
  reader.onload = (e) => {
    try {
      let data = [];
      const ext = file.name.split('.').pop().toLowerCase();
      
      if (ext === 'csv') {
        // Parse CSV
        const csv = e.target.result;
        const lines = csv.trim().split('\n');
        const headers = lines[0].split(',').map(h => h.trim());
        data = lines.slice(1).filter(l => l.trim()).map(line => {
          const values = line.split(',').map(v => v.trim());
          const obj = {};
          headers.forEach((h, i) => obj[h] = values[i] || '');
          return obj;
        });
        appState.headers = headers;
      } else {
        // Parse Excel
        const workbook = XLSX.read(e.target.result, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(worksheet);
        appState.headers = json.length > 0 ? Object.keys(json[0]) : [];
        data = json;
      }
      
      appState.sheetData = data;
      appState.isConnected = true;
      
      // Save to localStorage
      localStorage.setItem('weStoresData', JSON.stringify({
        sheetData: appState.sheetData,
        headers: appState.headers
      }));
      
      showMainApp();
      updateStats();
      enableChat();
      
      // Clear messages and show ready
      document.getElementById('chatMessages').innerHTML = '<div class="message ai">👋 Ask me anything about your data!</div>';
      addMessage('ai', `✅ Loaded ${appState.sheetData.length} records. What would you like to know?`);
    } catch (error) {
      alert('Error: ' + error.message);
    }
  };
  
  if (file.name.endsWith('.csv')) {
    reader.readAsText(file);
  } else {
    reader.readAsArrayBuffer(file);
  }
}
  document.getElementById('totalRecords').textContent = appState.sheetData.length;
  document.getElementById('totalFields').textContent = appState.headers.length;
}

function enableChat() {
  document.getElementById('chatInput').disabled = false;
  document.getElementById('sendButton').disabled = false;
}

function addMessage(role, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

document.getElementById('chatInput').addEventListener('keypress', e => {
  if (e.key === 'Enter' && !e.shiftKey && appState.isConnected) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg || !appState.isConnected) return;
  addMessage('user', msg);
  inp.value = '';
  
  const load = document.createElement('div');
  load.className = 'message ai';
  load.innerHTML = '<span class="loading"></span>Analyzing...';
  document.getElementById('chatMessages').appendChild(load);
  
  try {
    const sum = JSON.stringify(appState.sheetData.slice(0, CONFIG.SAMPLE_DATA_ROWS), null, 2);
    appState.conversationHistory.push({ 
      role: 'user', 
      content: `Data with ${appState.sheetData.length} records:\nColumns: ${appState.headers.join(', ')}\n\nSample:\n${sum}\n\nQuestion: ${msg}` 
    });
    
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CONFIG.CLAUDE_MODEL,
        max_tokens: CONFIG.CLAUDE_MAX_TOKENS,
        system: 'Analyze data. Provide clear, specific insights with concrete numbers, percentages, and examples.',
        messages: appState.conversationHistory
      })
    });
    
    const data = await res.json();
    load.remove();
    if (data.content?.[0]?.text) {
      const aiMsg = data.content[0].text;
      appState.conversationHistory.push({ role: 'assistant', content: aiMsg });
      addMessage('ai', aiMsg);
    } else {
      addMessage('ai', 'Could not generate response.');
    }
  } catch (e) {
    load.remove();
    addMessage('ai', `❌ Error: ${e.message}`);
  }
}
</script>

</body>
</html>

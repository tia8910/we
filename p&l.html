<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WE Franchise P&L — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ─── WE BRAND TOKENS ──────────────────────────────────────────────────────── */
:root {
  --we-navy:    #160A30;
  --we-purple:  #6B21A8;
  --we-purple2: #7C3AED;
  --we-purple3: #4C1D95;
  --we-orange:  #F5A31A;
  --we-teal:    #00A896;
  --we-red:     #E63946;
  --we-bg:      #F5F0FB;
  --we-surface: #FFFFFF;
  --we-s2:      #F0E9FA;
  --we-border:  #DDD0EF;
  --we-text:    #160A30;
  --we-mid:     #5B4080;
  --we-dim:     #9B82B8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--we-bg); color: var(--we-text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

input[type=text], input[type=password] {
  width: 100%; background: var(--we-bg); border: 1.5px solid var(--we-border);
  border-radius: 8px; padding: 10px 14px; color: var(--we-text);
  font-family: 'Inter', sans-serif; font-size: 13px; outline: none;
  transition: border-color .18s, box-shadow .18s; appearance: none;
}
input:focus {
  border-color: var(--we-purple2); box-shadow: 0 0 0 3px rgba(124,58,237,.12);
}

/* ─── LOGIN PAGE ────────────────────────────────────────────────────────────  */
#pg-login {
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center; padding: 24px 16px;
}
.login-box {
  width: 100%; max-width: 440px; background: white; border: 1px solid var(--we-border);
  border-radius: 18px; padding: 48px 40px; box-shadow: 0 12px 60px rgba(107,33,168,.16);
  animation: fadeUp .4s ease both;
}
.login-hero { text-align: center; margin-bottom: 34px; }
.login-brand { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 22px; }
.login-we-badge {
  width: 64px; height: 64px; border-radius: 50%; overflow: hidden;
  box-shadow: 0 6px 24px rgba(107,33,168,.3);
}
.login-title { font-family: 'Cairo', sans-serif; font-size: 26px; font-weight: 900; color: var(--we-navy); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--we-dim); letter-spacing: 1.5px; font-weight: 500; }
.field-wrap { position: relative; margin-bottom: 13px; }
.field-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; z-index: 1; }
.field-wrap input { padding-left: 40px; }
.btn-login {
  width: 100%; padding: 14px; background: linear-gradient(135deg, var(--we-purple) 0%, var(--we-purple2) 100%);
  color: white; border: none; border-radius: 10px; font-family: 'Cairo', sans-serif;
  font-weight: 700; font-size: 16px; cursor: pointer; letter-spacing: .5px;
  transition: opacity .2s, transform .1s; box-shadow: 0 5px 20px rgba(107,33,168,.35);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-login:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
.btn-login:disabled { opacity: .4; cursor: not-allowed; }
.login-spin { display: none; text-align: center; font-size: 11px; letter-spacing: 2px; color: var(--we-purple2); padding: 8px 0; }
.err-msg { color: var(--we-red); font-size: 12px; text-align: center; min-height: 20px; margin-top: 8px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-6px); }
  40%,80% { transform: translateX(6px); }
}
</style>
</head>

      <div class="login-title">P&amp;L Dashboard</div>
      <div class="login-sub">FRANCHISE PERFORMANCE PORTAL</div>
    </div>
    <div class="field-wrap"><span class="field-icon">👤</span><input type="text" id="f-user" placeholder="Username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('f-pass').focus()"/></div>
    <div class="field-wrap"><span class="field-icon">🔒</span><input type="password" id="f-pass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="login-spin" id="login-spin">⏳ &nbsp; VERIFYING...</div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Sign In →</button>
    <div class="err-msg" id="err-msg"></div>
  </div>
</div>
<script>
var CFG = {
  csv: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSf34GDV0tP5sXQkNk4lpxgDbtvtRoySRoaZ5SKAvBwTaFktPFy74GGJcnI4u4aJNVc5JfjDr2l5GvL/pub?output=csv',
  cid: '274617748695-f58u9qfpl5tp0t6mcl2uhumjphh59cb6.apps.googleusercontent.com'
};
function setLoading(on){
  document.getElementById('login-spin').style.display = on ? 'block' : 'none';
  document.getElementById('btn-login').disabled = on;
}
function setErr(msg){ document.getElementById('err-msg').textContent = msg||''; }
function shakeBox(){ var el = document.getElementById('login-box'); el.style.animation='shake .35s ease'; setTimeout(()=>el.style.animation='',400); }
async function fetchUsers(){
  var r = await fetch(CFG.csv+'&nocache='+Date.now());
  if(!r.ok) throw new Error('Cannot load user list');
  var txt = await r.text();
  var lines = txt.trim().split('\n').slice(1);
  return lines.map(l=>{
    var cols = l.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    return{ username:(cols[0]||'').toLowerCase(), password:cols[1]||'', name:cols[2]||'', role:(cols[3]||'').toLowerCase(), active:(cols[4]||'true').toLowerCase() };
  });
}
async function doLogin(){
  setErr('');
  var user = (document.getElementById('f-user').value||'').trim().toLowerCase();
  var pass = (document.getElementById('f-pass').value||'').trim();
  if(!user||!pass){ setErr('Please enter username and password.'); shakeBox(); return; }
  setLoading(true);
  try{
    var users = await fetchUsers();
    var found = users.find(u=>u.username===user&&u.password===pass);
    if(!found){ setErr('Invalid username or password.'); shakeBox(); setLoading(false); return; }
    if(found.active==='false'||found.active==='0'){ setErr('Account is inactive. Contact admin.'); shakeBox(); setLoading(false); return; }
    sessionStorage.setItem('pl_user', JSON.stringify({name:found.name, role:found.role, username:found.username}));
    window.location.href = 'we-pl-dashboard.html';
  }catch(e){
    setErr('Connection error: '+e.message); shakeBox(); setLoading(false);
  }
}
</script>
